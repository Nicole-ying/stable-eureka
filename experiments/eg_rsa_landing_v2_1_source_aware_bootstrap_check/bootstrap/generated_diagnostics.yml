source: primitive_interface_generated_runtime_spec
input_boundary: anonymous_source_to_primitive_interface
identity_hidden_from_llm: true
raw_env_code_input: false
eureka_like_input_status: source_aware_bootstrap_agent
observation_mapping:
  x_pos: 0
  y_pos: 1
  x_vel: 2
  y_vel: 3
  angle: 4
  ang_vel: 5
  left_leg: 6
  right_leg: 7
action_variables:
- name: main_engine
  description: main upward thrust (0 or 1)
  type: float
- name: side_engine
  description: side engine thrust (-1 for one direction, 0 off, 1 for opposite)
  type: float
action_mapping:
  type: discrete_lookup
  variables:
    main_engine:
      '0': 0.0
      '1': 0.0
      '2': 1.0
      '3': 0.0
      default: 0.0
    side_engine:
      '0': 0.0
      '1': 1.0
      '2': 0.0
      '3': -1.0
      default: 0.0
events:
  action_nonzero:
    type: action_nonzero
task_metrics:
  attitude_smoothness:
    type: raw_abs_inverse
    inputs:
    - angle
  energy_cost:
    type: action_cost
  progress:
    type: metric_mean
    metrics:
    - attitude_smoothness
