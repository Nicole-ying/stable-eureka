expected_failure_modes:
- Agent hovers near ground without landing to collect dense descent rewards indefinitely.
- Agent lands quickly but flips or crashes because stability penalty insufficiently
  weighted.
- Agent overuses side engines causing lateral oscillation and poor centering.
- Agent learns to abuse soft_landing_approach by staying high with low vy to collect
  intermediate reward.
risk_notes:
- r_fast_descend and r_soft_landing_approach together could create a local optimum
  where agent descends quickly then uses main engine near ground to zero velocity,
  but may still crash if timing is off.
- Fuel penalties are linear with action values; discrete actions (0 or 1) make this
  equivalent to charge per firing step, which is appropriate.
