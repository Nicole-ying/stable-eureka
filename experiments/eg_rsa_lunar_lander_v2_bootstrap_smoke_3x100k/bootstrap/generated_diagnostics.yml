source: primitive_interface_generated_runtime_spec
observation_mapping:
  x: 0
  y: 1
  vx: 2
  vy: 3
  angle: 4
  angular_velocity: 5
  left_contact: 6
  right_contact: 7
events:
  left_contact:
    type: threshold_gt
    var: left_contact
    threshold: 0.5
  right_contact:
    type: threshold_gt
    var: right_contact
    threshold: 0.5
  contact:
    type: any
    events:
    - left_contact
    - right_contact
  both_contact:
    type: all
    events:
    - left_contact
    - right_contact
  engine_on:
    type: action_nonzero
task_metrics:
  horizontal_centering:
    type: raw_abs_inverse
    inputs:
    - x
  velocity_smoothness:
    type: raw_abs_inverse
    inputs:
    - vx
    - vy
  attitude_smoothness:
    type: raw_abs_inverse
    inputs:
    - angle
    - angular_velocity
  energy_cost:
    type: action_cost
  progress:
    type: metric_mean
    metrics:
    - horizontal_centering
    - velocity_smoothness
    - attitude_smoothness
  two_leg_contact_evidence:
    type: event_score
    event: both_contact
