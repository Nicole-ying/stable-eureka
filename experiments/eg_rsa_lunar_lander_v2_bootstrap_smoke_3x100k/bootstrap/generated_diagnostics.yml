expected_failure_modes:
- Agent hovers indefinitely near x=0 to collect dense centering reward without landing.
- Agent may repeatedly crash softly to exploit reset mechanism if crash penalty insufficient.
- Agent might oscillate orientation to avoid upright penalty while not landing.
- Low fuel penalty weight could lead to excessive throttling.
- High descent speed near ground without leg contact may not be penalized enough if
  soft_descent weight is too low.
risk_notes:
- Centering reward could cause over-staying near center; ensure total episode budget
  motivates timely landing via fuel penalty and success bonus.
- Crash penalty defined only on leg contact and extreme velocity/angle; may miss body-first
  crashes where legs never touch; relies on environment episodic termination to limit
  exploit.
- 'Success threshold for touchdown: vx<0.2, vy<0.2, angle<0.1 might be too strict/lenient;
  monitor first successful landings.'
- No explicit reward for hovering close to ground; descent guidance only activates
  when y<0.5, gap between ground and flag position may require tuning.
- Agent may develop 'suicidal' descents that trigger crash penalty only once but learn
  to get high centering reward before that, requiring careful weight balance.
