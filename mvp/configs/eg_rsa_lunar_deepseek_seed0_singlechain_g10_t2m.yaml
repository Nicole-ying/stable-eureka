model:
  provider: deepseek
  llm_model: deepseek-v4-flash
  vlm_model: deepseek-v4-flash
  deepseek_base_url: https://api.deepseek.com
  deepseek_api_key_env: DEEPSEEK_API_KEY
  deepseek_thinking: disabled
  temperature: 0.7
  max_tokens: 2500

rl:
  env_id: LunarLander-v3

  # Long run budget: 10 generations × 1 candidate × 2M PPO steps.
  total_timesteps: 2000000
  eval_episodes: 10

  # RL-Baselines3-Zoo PPO LunarLander-v3 style hyperparameters.
  # We intentionally keep single-env training here; no n_envs/VecEnv logic.
  n_steps: 1024
  batch_size: 64
  gae_lambda: 0.98
  gamma: 0.999
  n_epochs: 4
  ent_coef: 0.01
  learning_rate: 0.0003
  clip_range: 0.2
  vf_coef: 0.5
  max_grad_norm: 0.5

  # Disable video during long runs; turn on only for selected inspection runs.
  render_video: false

evolution:
  generations: 10
  population_size: 1
  elite_size: 1
  reflection_top_k: 1
  target_score:
  max_stagnation_generations:

memory:
  candidate_lesson_top_k: 8
  env_lesson_top_k: 10
  ltm_lesson_top_k: 0
  parent_code_top_k: 1
  parent_code_max_chars: 12000
  feedback_max_chars: 12000
  memory_context_max_chars: 14000

workspace: runs/eg_rsa_lunar_deepseek_seed0_singlechain_g10_t2m
seed: 0
