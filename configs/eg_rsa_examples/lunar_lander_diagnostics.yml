observation_mapping:
  x: 0
  y: 1
  vx: 2
  vy: 3
  angle: 4
  angular_velocity: 5
  left_leg_contact: 6
  right_leg_contact: 7

events:
  left_contact:
    type: threshold_gt
    var: left_leg_contact
    threshold: 0.5
  right_contact:
    type: threshold_gt
    var: right_leg_contact
    threshold: 0.5
  contact:
    type: any
    events: [left_contact, right_contact]
  both_contact:
    type: all
    events: [left_contact, right_contact]

  # The landing pad is a safe region, not a single mathematical point.
  # These events are coarse phase markers used for diagnostics and event rules.
  within_pad_x:
    type: threshold_abs
    var: x
    threshold: 0.20
  near_pad_x:
    type: threshold_abs
    var: x
    threshold: 0.45
  near_ground_y:
    type: threshold_abs
    var: y
    threshold: 0.25
  approach_region:
    type: all
    events: [near_pad_x, near_ground_y]
  landing_region:
    type: all
    events: [within_pad_x, near_ground_y]

  # Safe contact should depend on velocity and attitude, not contact alone.
  low_angle:
    type: threshold_abs
    var: angle
    threshold: 0.20
  low_angular_velocity:
    type: threshold_abs
    var: angular_velocity
    threshold: 0.20
  low_vx:
    type: threshold_abs
    var: vx
    threshold: 0.20
  low_vy:
    type: threshold_abs
    var: vy
    threshold: 0.25
  stable_motion:
    type: all
    events: [low_angle, low_angular_velocity, low_vx, low_vy]

  safe_contact:
    type: all
    events: [contact, landing_region, stable_motion]
  stable_both_contact:
    type: all
    events: [both_contact, landing_region, stable_motion]
  stable_landing_condition:
    type: all
    events: [stable_both_contact]

  engine_on:
    type: action_nonzero

task_metrics:
  # Region-aware approach score. It is 1 inside the safe landing region and
  # decays smoothly outside the region. This replaces over-penalizing every
  # step's Euclidean distance to the exact point (0,0).
  landing_region_score:
    type: target_region
    inputs: [x, y]
    center: [0.0, 0.0]
    tolerance: [0.20, 0.25]

  approach_region_score:
    type: target_region
    inputs: [x, y]
    center: [0.0, 0.0]
    tolerance: [0.45, 0.40]

  # Stability scores are scaled so that safe velocity and attitude are rewarded
  # as process signals before final contact occurs.
  stability:
    type: bounded_stability
    inputs: [vx, vy, angle, angular_velocity]
    scales: [0.50, 0.50, 0.30, 0.30]

  horizontal_alignment:
    type: raw_abs_inverse
    inputs: [x]

  vertical_safety:
    type: raw_abs_inverse
    inputs: [vy]

  energy_cost:
    type: action_cost

  approach_and_stability:
    type: metric_product
    metrics: [approach_region_score, stability]

  landing_quality:
    type: metric_product
    metrics: [landing_region_score, stability]

  safe_contact_score:
    type: event_score
    event: safe_contact

  success:
    type: event_success
    event: stable_landing_condition


# v1 generic semantic role taxonomy. These roles are environment-portable.
# Environment Semantic Translator should generate the same kind of mapping for
# new environments such as BipedalWalker.
reward_semantic_roles:
  terminal_success:
    description: sparse task completion or success reward
  dense_guidance:
    description: dense progress, navigation, or approach shaping
  stability_quality:
    description: stability, smoothness, posture, quality, or safe-state shaping
  control_cost:
    description: energy, action magnitude, torque, effort, or control penalty
  safety_constraint:
    description: fall, collision, crash, unsafe state, or safety event

behavior_signal_roles:
  success_evidence:
    description: episode-level task success evidence
    preferred_fields: [success_episode_rate, terminal_reward_paid_episode_rate]
  stability_evidence:
    description: episode-level stable or safe behavior evidence
    preferred_fields: [stable_landing_episode_rate, safe_contact_episode_rate]
  progress_evidence:
    description: task progress evidence before success
    preferred_fields: [semantic_score, progress_score_mean]
  instability_signal:
    description: instability, repeated contact, fall, or oscillation signal
    preferred_fields: [contact_toggle_mean, instability_signal, fall_rate]
