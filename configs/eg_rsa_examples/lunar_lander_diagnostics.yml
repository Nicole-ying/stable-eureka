observation_mapping:
  x: 0
  y: 1
  vx: 2
  vy: 3
  angle: 4
  angular_velocity: 5
  left_leg_contact: 6
  right_leg_contact: 7

events:
  left_contact:
    type: threshold_gt
    var: left_leg_contact
    threshold: 0.5
  right_contact:
    type: threshold_gt
    var: right_leg_contact
    threshold: 0.5
  contact:
    type: any
    events: [left_contact, right_contact]
  both_contact:
    type: all
    events: [left_contact, right_contact]
  near_x:
    type: threshold_abs
    var: x
    threshold: 0.25
  near_y:
    type: threshold_abs
    var: y
    threshold: 0.25
  near_goal:
    type: all
    events: [near_x, near_y]
  low_angle:
    type: threshold_abs
    var: angle
    threshold: 0.10
  low_vx:
    type: threshold_abs
    var: vx
    threshold: 0.10
  low_vy:
    type: threshold_abs
    var: vy
    threshold: 0.10
  stable_motion:
    type: all
    events: [low_angle, low_vx, low_vy]
  stable_landing_condition:
    type: all
    events: [both_contact, near_goal, stable_motion]
  engine_on:
    type: action_nonzero

task_metrics:
  progress:
    type: distance_to_target
    inputs: [x, y]
    target: [0.0, 0.0]
  stability:
    type: bounded_stability
    inputs: [vx, vy, angle, angular_velocity]
  energy_cost:
    type: action_cost
  success:
    type: event_success
    event: stable_landing_condition
