experiment:
  output_dir: experiments/eg_rsa_lunar_lander_v1_role_attrib_10x1m
environment:
  name: lunar_lander
  family: landing_control
  gym_id: LunarLander-v3
  kwargs: {}
eg_rsa:
  iterations: 10
  experiment_mode:
    preset: full
  initial_schema_path: configs/eg_rsa_examples/lunar_lander_initial_schema.json
  diagnostic_spec_path: configs/eg_rsa_examples/lunar_lander_diagnostics.yml
  task_description_path: envs/lunar_lander/task_description.txt
  edit_agent:
    backend: deepseek
    model: deepseek-v4-pro
    credential_env: DEEPSEEK_API_KEY
    temperature: 0.2
memory:
  top_k: 3
  lesson_top_k: 8
  outcome_lesson_top_k: 8
hack_detector:
  dominance_threshold: 0.7
  event_toggle_threshold: 6
  low_success_threshold: 0.2
candidate_evaluator:
  min_event_trigger_rate: 0.001
  min_metric_variation: 0.0001
  min_metric_active_rate: 0.01
  reject_zero_signal: true
edit_gate:
  max_edits_per_iteration: 3
  min_target_ratio: 0.02
  min_target_trigger_rate: 0.01
outcome_acceptor:
  min_task_improvement: 0.02
  max_task_drop: 0.05
  min_semantic_improvement: 0.05
  max_semantic_drop: 0.05
  min_hack_improvement: 0.1
  max_hack_increase: 0.05
agent_action_controller:
  active: true
scale_audit:
  active: true
  max_dense_to_terminal_ratio: 0.25
  horizon: 1000
  repair_enabled: true
behavior_risk_audit:
  active: true
  block_medium: false
  weak_success_evidence: 0.5
  weak_stability_evidence: 0.5
  large_role_increase_factor: 2.5
  large_guidance_drop_factor: 0.25
  large_stability_drop_factor: 0.5
  high_instability_signal: 50.0
  moderate_role_increase_factor: 1.5
  moderate_guidance_drop_factor: 0.5
  dominance_ratio_threshold: 0.65
  medium_risk_budget_when_weak_success: 2
  block_medium_under_weak_success: false
rl:
  algo: ppo
  algo_params:
    policy: MlpPolicy
    learning_rate: 0.0003
    n_steps: 1024
    batch_size: 64
    n_epochs: 10
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.2
    ent_coef: 0.0
    vf_coef: 0.5
    max_grad_norm: 0.5
  training:
    total_timesteps: 1000000
    seed: 0
    device: auto
    verbose: 1
  evaluation:
    seed: 10
    num_episodes: 6
posthoc_eval:
  enabled: true
  seed: 20
  num_episodes: 10
