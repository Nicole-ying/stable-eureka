experiment:
  output_dir: experiments/eg_rsa_landing_v2_1_source_aware_bootstrap_check

environment:
  name: landing_runtime_only
  family: landing_control
  gym_id: LunarLander-v3
  kwargs: {}

eg_rsa:
  iterations: 1

  experiment_mode:
    preset: full

  schema_source:
    type: llm_bootstrap
    source_aware: true
    input_mode: anonymous_source
    eureka_like_task_path: configs/eg_rsa_examples/anonymous_landing_source_task.json
    interface_output_subdir: interface
    output_subdir: bootstrap
    reuse_if_exists: false
    repair_on_invalid_schema: true
    repair_attempts: 2
    fallback_on_invalid_schema: false

  edit_agent:
    backend: deepseek
    model: deepseek-v4-pro
    credential_env: DEEPSEEK_API_KEY
    temperature: 0.0
    timeout: 300

memory:
  top_k: 3
  lesson_top_k: 8
  outcome_lesson_top_k: 8

hack_detector:
  dominance_threshold: 0.7
  event_toggle_threshold: 6
  low_success_threshold: 0.2

candidate_evaluator:
  min_event_trigger_rate: 0.001
  min_metric_variation: 0.0001
  min_metric_active_rate: 0.01
  reject_zero_signal: true
  hard_filter: false
  advisory_only: true

edit_gate:
  max_edits_per_iteration: 3
  min_target_ratio: 0.02
  min_target_trigger_rate: 0.01

outcome_acceptor:
  min_task_improvement: 0.02
  max_task_drop: 0.05
  min_semantic_improvement: 0.05
  max_semantic_drop: 0.05
  min_hack_improvement: 0.1
  max_hack_increase: 0.05

agent_action_controller:
  active: false
  advisory_only: true

scale_audit:
  active: true
  max_dense_to_terminal_ratio: 0.25
  horizon: 1000
  repair_enabled: false
  hard_block: false
  advisory_only: true

behavior_risk_audit:
  active: true
  block_medium: false
  weak_success_evidence: 0.5
  weak_stability_evidence: 0.5
  medium_risk_budget_when_weak_success: 2
  block_medium_under_weak_success: false
  hard_block: false
  advisory_only: true

rl:
  algo: ppo
  algo_params:
    policy: MlpPolicy
    learning_rate: 0.0003
    n_steps: 1024
    batch_size: 64
    n_epochs: 10
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.2
    ent_coef: 0.0
    vf_coef: 0.5
    max_grad_norm: 0.5

  training:
    total_timesteps: 5000
    seed: 0
    device: auto
    verbose: 1

  evaluation:
    seed: 10
    num_episodes: 1

posthoc_eval:
  enabled: true
  seed: 20
  num_episodes: 1
