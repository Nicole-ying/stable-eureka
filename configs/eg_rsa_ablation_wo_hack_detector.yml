experiment:
  output_dir: experiments/eg_rsa_lunar_lander_wo_hack_detector

environment:
  name: lunar_lander
  family: landing_control
  gym_id: LunarLander-v3
  kwargs: {}

eg_rsa:
  iterations: 2
  experiment_mode:
    preset: wo_hack_detector
  initial_schema_path: configs/eg_rsa_examples/lunar_lander_initial_schema.json
  diagnostic_spec_path: configs/eg_rsa_examples/lunar_lander_diagnostics.yml
  task_description_path: envs/lunar_lander/task_description.txt
  edit_agent:
    backend: fallback
    model: qwen2.5:14b
    host: http://localhost:11434
    temperature: 0.2
    timeout: 120

memory:
  top_k: 3

hack_detector:
  dominance_threshold: 0.70
  event_toggle_threshold: 4
  low_success_threshold: 0.20

rl:
  algo: ppo
  algo_params:
    policy: MlpPolicy
    learning_rate: 0.0003
    n_steps: 1024
    batch_size: 64
    n_epochs: 10
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.2
    ent_coef: 0.0
    vf_coef: 0.5
    max_grad_norm: 0.5
  training:
    total_timesteps: 50000
    seed: 0
    device: auto
    verbose: 1
  evaluation:
    seed: 10
    num_episodes: 5

posthoc_eval:
  enabled: true
  seed: 20
  num_episodes: 5
